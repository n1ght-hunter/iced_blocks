[workspace]
members = ["crates/*"]
resolver = "3"

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/n1ght-hunter/iced_blocks"

[workspace.dependencies]
iced_native_surface = { version = "0.1.0", path = "crates/iced_native_surface" }
iced = "0.14"
futures = "0.3"
wry = "0.55"
glam = "0.32"
bytemuck = { version = "1", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
image = { version = "0.25", default-features = false }
windows-sys = { version = "0.61", features = ["Win32_UI_WindowsAndMessaging", "Win32_UI_Input_KeyboardAndMouse"] }
